<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спасибо за заявку</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:Arial,sans-serif;
    background:#FDFAF8;
    color:#3D2B2B;
    text-align:center;
    padding:24px;
  }
  .box{
    max-width:560px;
    padding:40px 28px;
    border:1px solid rgba(180,120,120,0.2);
    background:#fff;
  }
  h1{
    margin:0 0 14px;
    font-size:32px;
    font-weight:600;
  }
  p{
    margin:0;
    font-size:18px;
    line-height:1.6;
    color:#7A5C5C;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Спасибо, заявка отправлена</h1>
    <p>Мы получили ваше сообщение и скоро свяжемся с вами.</p>
  </div>
</body>
</html>
